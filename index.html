<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北歐六天旅遊 ✈ 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --purple:#7F77DD;--purple-light:#EEEDFE;--purple-dark:#3C3489;
    --teal:#1D9E75;--teal-light:#E1F5EE;--teal-dark:#085041;
    --amber:#BA7517;--amber-light:#FAEEDA;
    --coral:#D85A30;--coral-light:#FAECE7;
    --blue:#378ADD;--blue-light:#E6F1FB;--blue-dark:#0C447C;
    --bg:#f8f8f6;--card:#ffffff;--border:#e5e4e0;
    --text:#1a1a1a;--text2:#666;--text3:#aaa;
    --radius:12px;--radius-sm:8px;--radius-pill:20px;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  /* Header */
  .app-header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100}
  .app-header h1{font-size:17px;font-weight:600;letter-spacing:-0.3px}
  .app-header .subtitle{font-size:12px;color:var(--text2);margin-top:1px}
  /* Bottom nav */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
  .nav-btn{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;transition:color 0.15s}
  .nav-btn i{font-size:22px}
  .nav-btn.active{color:var(--purple)}
  /* Layout */
  .content{padding:14px 14px 90px}
  .section{display:none}.section.active{display:block}
  /* Cards */
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
  .card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
  /* Badges */
  .badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 9px;border-radius:var(--radius-pill)}
  .bp{background:var(--purple-light);color:var(--purple-dark)}
  .bt{background:var(--teal-light);color:var(--teal-dark)}
  .ba{background:var(--amber-light);color:var(--amber)}
  .bb{background:var(--blue-light);color:var(--blue-dark)}
  .bc{background:var(--coral-light);color:var(--coral)}
  /* Today banner */
  .today-banner{background:var(--purple-light);border-left:3px solid var(--purple);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:12px 16px;margin-bottom:14px}
  .today-label{font-size:11px;font-weight:600;color:var(--purple);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
  .today-text{font-size:15px;font-weight:600;color:var(--purple-dark)}
  .today-date{font-size:12px;color:var(--purple);margin-top:2px}
  /* Day tabs */
  .day-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:4px;-webkit-overflow-scrolling:touch}
  .day-tabs::-webkit-scrollbar{display:none}
  .day-tab{flex-shrink:0;padding:7px 14px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:var(--radius-pill);background:var(--card);color:var(--text2);cursor:pointer;transition:all .15s}
  .day-tab.active{background:var(--purple);border-color:var(--purple);color:#fff}
  /* Activities */
  .act-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
  .act-row:last-child{border-bottom:none}
  .act-time{font-size:11px;color:var(--text3);min-width:36px;padding-top:3px;line-height:1.3}
  .act-dot{width:8px;height:8px;border-radius:50%;background:#c0bdf0;margin-top:4px;flex-shrink:0;transition:background .2s}
  .act-row.done .act-dot{background:var(--teal)}
  .act-name{font-size:13px;color:var(--text);flex:1;line-height:1.5}
  .act-row.done .act-name{text-decoration:line-through;color:var(--text3)}
  .act-check{font-size:18px;color:var(--text3);transition:color .2s}
  .act-row.done .act-check{color:var(--teal)}
  /* Flights */
  .flight-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
  .flight-row:last-child{border-bottom:none;padding-bottom:0}
  .fl-time{font-size:16px;font-weight:600;min-width:46px}
  .fl-code{font-size:11px;color:var(--text2)}
  .fl-mid{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
  .fl-num{font-size:11px;color:var(--text2)}
  .fl-line{width:100%;height:1px;background:var(--border);position:relative}
  .fl-line::after{content:'▶';position:absolute;right:-4px;top:-7px;font-size:10px;color:var(--text3)}
  .fl-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  /* Restaurants */
  .rest-filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch}
  .rest-filters::-webkit-scrollbar{display:none}
  .filter-chip{flex-shrink:0;padding:6px 14px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius-pill);background:var(--card);color:var(--text2);cursor:pointer;font-weight:500}
  .filter-chip.active{background:var(--teal-light);border-color:var(--teal);color:var(--teal-dark)}
  .rest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:4px}
  .rest-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:border-color .15s}
  .rest-card.saved{border-color:var(--coral)}
  .rest-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;display:flex;justify-content:space-between;align-items:flex-start;gap:4px}
  .rest-heart{font-size:15px;color:var(--text3);transition:color .2s;flex-shrink:0}
  .rest-card.saved .rest-heart{color:var(--coral)}
  .rest-stars{color:var(--amber);font-size:11px;margin-bottom:4px}
  .rest-meta{font-size:11px;color:var(--text2)}
  /* Photos */
  .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .photo-cell{aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;background:#f0efea;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer}
  .photo-cell img{width:100%;height:100%;object-fit:cover;display:block}
  .photo-day-chip{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,.5);color:#fff;font-size:9px;padding:2px 6px;border-radius:4px}
  .upload-btn-wrap{margin-top:12px}
  .upload-btn{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 18px;cursor:pointer;background:var(--card);font-weight:500}
  /* Add row */
  .add-row{display:flex;gap:8px;margin-top:12px}
  .add-row input,.add-row select{flex:1;font-size:13px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);outline:none}
  .add-row input:focus,.add-row select:focus{border-color:var(--purple)}
  .add-row select{flex:0 0 80px}
  .btn-add{font-size:13px;padding:8px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text2);cursor:pointer;white-space:nowrap;font-weight:500}
  .btn-add:active{background:var(--bg)}
  /* Empty */
  .empty{padding:32px 0;display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--text3)}
  .empty i{font-size:36px}
  .empty p{font-size:13px}
  /* Section heading */
  .sec-head{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin:16px 0 8px}
  /* Progress */
  .prog-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
  .prog-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .3s}
</style>
</head>
<body>

<div class="app-header">
  <h1>✈ 北歐六天旅遊</h1>
  <div class="subtitle" id="header-sub">哥本哈根 → 挪威 → 斯德哥爾摩 · 2026</div>
</div>

<div class="content">
  <!-- TODAY -->
  <div id="sec-today" class="section active">
    <div class="today-banner">
      <div class="today-label">今天</div>
      <div class="today-text" id="today-title">載入中…</div>
      <div class="today-date" id="today-date"></div>
    </div>
    <div id="today-acts"></div>
    <div class="sec-head" style="margin-top:18px">行程進度</div>
    <div class="card" id="progress-card"></div>
  </div>

  <!-- FLIGHTS -->
  <div id="sec-flights" class="section">
    <div class="sec-head">航班 & 交通</div>
    <div id="flights-list"></div>
    <div class="add-row">
      <input placeholder="新增交通備注…" id="flight-note-input">
      <button class="btn-add" onclick="addFlightNote()"><i class="ti ti-plus"></i></button>
    </div>
  </div>

  <!-- ITINERARY -->
  <div id="sec-itinerary" class="section">
    <div class="day-tabs" id="itin-tabs"></div>
    <div id="itin-content"></div>
    <div class="add-row">
      <input placeholder="新增活動…" id="act-input">
      <select id="act-time">
        <option>上午</option><option>中午</option><option>下午</option><option>傍晚</option><option>晚上</option>
      </select>
      <button class="btn-add" onclick="addActivity()"><i class="ti ti-plus"></i></button>
    </div>
  </div>

  <!-- RESTAURANTS -->
  <div id="sec-restaurants" class="section">
    <div class="rest-filters" id="rest-filters"></div>
    <div class="rest-grid" id="rest-grid"></div>
    <div class="add-row">
      <input placeholder="餐廳名稱" id="rest-input" style="flex:2">
      <select id="rest-city">
        <option value="cph">哥本哈根</option>
        <option value="osl">奧斯陸</option>
        <option value="ber">卑爾根</option>
        <option value="sto">斯德哥爾摩</option>
      </select>
      <button class="btn-add" onclick="addRestaurant()"><i class="ti ti-plus"></i></button>
    </div>
  </div>

  <!-- PHOTOS -->
  <div id="sec-photos" class="section">
    <div class="day-tabs" id="photo-tabs"></div>
    <div class="photo-grid" id="photo-grid"></div>
    <div class="upload-btn-wrap">
      <label class="upload-btn">
        <i class="ti ti-camera" style="font-size:18px"></i> 上傳照片
        <input type="file" accept="image/*" multiple style="display:none" onchange="uploadPhotos(this)">
      </label>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('today',this)" id="nav-today">
    <i class="ti ti-home"></i><span>今天</span>
  </button>
  <button class="nav-btn" onclick="switchTab('flights',this)">
    <i class="ti ti-plane"></i><span>航班</span>
  </button>
  <button class="nav-btn" onclick="switchTab('itinerary',this)">
    <i class="ti ti-calendar"></i><span>行程</span>
  </button>
  <button class="nav-btn" onclick="switchTab('restaurants',this)">
    <i class="ti ti-tools-kitchen-2"></i><span>餐廳</span>
  </button>
  <button class="nav-btn" onclick="switchTab('photos',this)">
    <i class="ti ti-photo"></i><span>相簿</span>
  </button>
</nav>

<script>
const STORE = 'nordic_site_v1';
const START = new Date('2026-08-14');
const CITY_LABELS = {cph:'哥本哈根',osl:'奧斯陸',ber:'卑爾根',sto:'斯德哥爾摩'};

function dayDate(n) {
  const d = new Date(START);
  d.setDate(d.getDate() + n - 1);
  return d.toLocaleDateString('zh-TW',{month:'long',day:'numeric',weekday:'short'});
}

const DEFAULT = {
  itinDay: 0,
  photoDay: 0,
  restFilter: 'all',
  flights: [
    {icon:'ti-plane-departure',title:'哥本哈根 → 奧斯陸',from:'07:45',fromCode:'CPH',to:'09:05',toCode:'OSL',info:'SK 1468 · SAS · 1h 20m',day:3,tags:['第3天','SAS北歐航空','行李23kg']},
    {icon:'ti-train',title:'奧斯陸 → 卑爾根（Bergen Line）',from:'08:05',fromCode:'Oslo S',to:'14:35',toCode:'Bergen',info:'NSB · 6h 30m',day:4,tags:['第4天','世界最美鐵路']},
    {icon:'ti-plane-departure',title:'卑爾根 → 斯德哥爾摩',from:'10:20',fromCode:'BGO',to:'12:55',toCode:'ARN',info:'DY 664 · Norwegian · 1h 35m',day:5,tags:['第5天','Norwegian','行李23kg']},
  ],
  flightNotes: [],
  itinerary: [
    {day:1,city:'cph',title:'抵達哥本哈根',acts:[
      {time:'下午',name:'抵達 CPH 機場，入住 Hotel d\'Angleterre',done:false},
      {time:'傍晚',name:'漫步新港（Nyhavn）運河',done:false},
      {time:'晚上',name:'品嚐丹麥傳統 smørrebrød',done:false}
    ]},
    {day:2,city:'cph',title:'哥本哈根全日遊',acts:[
      {time:'上午',name:'小美人魚雕像 + 阿美琳堡宮殿廣場',done:false},
      {time:'中午',name:'Torvehallerne 市場午餐',done:false},
      {time:'下午',name:'Tivoli 樂園（世界第二古老遊樂園）',done:false},
      {time:'晚上',name:'Strøget 步行街購物',done:false}
    ]},
    {day:3,city:'osl',title:'飛往奧斯陸',acts:[
      {time:'上午',name:'SK 1468 哥本哈根 → 奧斯陸 07:45 起飛',done:false},
      {time:'下午',name:'Vigeland 雕塑公園（212座雕像）',done:false},
      {time:'下午',name:'挪威民俗博物館',done:false},
      {time:'晚上',name:'阿克碼頭（Aker Brygge）海鮮晚餐',done:false}
    ]},
    {day:4,city:'ber',title:'最美鐵路 → 卑爾根',acts:[
      {time:'上午',name:'Oslo S 搭 NSB 火車 08:05 出發（Bergen Line）',done:false},
      {time:'下午',name:'抵達卑爾根，入住 Hotel Rosenkrantz',done:false},
      {time:'下午',name:'Bryggen 木屋碼頭（世界遺產）漫步',done:false},
      {time:'傍晚',name:'Fløibanen 纜車登山俯瞰峽灣',done:false},
      {time:'晚上',name:'魚市場新鮮海鮮大餐',done:false}
    ]},
    {day:5,city:'sto',title:'飛往斯德哥爾摩',acts:[
      {time:'上午',name:'DY 664 卑爾根 → 斯德哥爾摩 10:20 起飛',done:false},
      {time:'下午',name:'Gamla Stan 老城區漫步',done:false},
      {time:'下午',name:'瓦薩博物館（17世紀沉船）',done:false},
      {time:'晚上',name:'Östermalm 美食市場晚餐',done:false}
    ]},
    {day:6,city:'sto',title:'斯德哥爾摩 + 返程',acts:[
      {time:'上午',name:'ABBA 博物館 或 Djurgården 島',done:false},
      {time:'中午',name:'最後一頓北歐午餐 — 瑞典肉丸！',done:false},
      {time:'下午',name:'前往 ARN 機場準備返程',done:false}
    ]}
  ],
  restaurants: [
    {name:'Noma',city:'cph',type:'新北歐',stars:5,saved:true,note:'需提前訂位'},
    {name:'Schønnemann',city:'cph',type:'傳統丹麥',stars:4,saved:false,note:'smørrebrød 名店'},
    {name:'Maaemo',city:'osl',type:'米其林三星',stars:5,saved:true,note:'挪威最頂級'},
    {name:'Fiskeriet',city:'osl',type:'海鮮',stars:4,saved:false,note:'新鮮當日漁獲'},
    {name:'Lysverket',city:'ber',type:'創意海鮮',stars:4,saved:false,note:'峽灣食材'},
    {name:'Bryggeloftet',city:'ber',type:'挪威傳統',stars:4,saved:false,note:'百年老屋'},
    {name:'Frantzén',city:'sto',type:'米其林三星',stars:5,saved:true,note:'瑞典最佳餐廳'},
    {name:'Aifur',city:'sto',type:'維京主題',stars:4,saved:false,note:'中世紀氛圍'},
  ],
  photos: []
};

let D = (()=>{ try{ const r=localStorage.getItem(STORE); return r?JSON.parse(r):null; }catch(e){return null;} })() || JSON.parse(JSON.stringify(DEFAULT));
function save(){ try{ localStorage.setItem(STORE,JSON.stringify(D)); }catch(e){} }

function switchTab(id, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  btn.classList.add('active');
  const renders = {today:renderToday,flights:renderFlights,itinerary:renderItinerary,restaurants:renderRestaurants,photos:renderPhotos};
  if(renders[id]) renders[id]();
}

/* TODAY */
function renderToday() {
  const today = new Date();
  const diff = Math.floor((today - START) / 86400000);
  const idx = Math.max(0, Math.min(5, diff));
  const day = D.itinerary[idx];
  document.getElementById('today-title').textContent = `第 ${day.day} 天 — ${day.title}`;
  document.getElementById('today-date').textContent = dayDate(day.day) + ' · ' + CITY_LABELS[day.city];

  const done = day.acts.filter(a=>a.done).length;
  const pct = day.acts.length ? Math.round(done/day.acts.length*100) : 0;

  let html = '<div class="card"><div class="card-title"><i class="ti ti-map-pin" style="font-size:16px"></i>' + day.title + '</div>';
  html += day.acts.map((a,ai)=>`<div class="act-row ${a.done?'done':''}" onclick="toggleAct(${idx},${ai});renderToday()"><span class="act-time">${a.time}</span><span class="act-dot"></span><span class="act-name">${a.name}</span><i class="ti ti-${a.done?'circle-check':'circle'} act-check"></i></div>`).join('');
  html += '</div>';
  document.getElementById('today-acts').innerHTML = html;

  let prog = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:13px;font-weight:500">今日完成度</span><span style="font-size:13px;color:var(--text2)">'+(done)+' / '+(day.acts.length)+'</span></div><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>';
  D.itinerary.forEach((d,i)=>{
    const dc = d.acts.filter(a=>a.done).length;
    const dp = d.acts.length ? Math.round(dc/d.acts.length*100) : 0;
    prog += '<div style="display:flex;align-items:center;gap:8px;margin-top:8px"><span style="font-size:11px;color:var(--text3);min-width:26px">D'+d.day+'</span><div class="prog-bar" style="flex:1"><div class="prog-fill" style="width:'+dp+'%;background:'+(i===idx?'var(--purple)':'var(--teal)')+'"></div></div><span style="font-size:11px;color:var(--text3);min-width:30px;text-align:right">'+dp+'%</span></div>';
  });
  document.getElementById('progress-card').innerHTML = prog;
}

/* FLIGHTS */
function renderFlights() {
  let html = '';
  D.flights.forEach(f=>{
    html += '<div class="card"><div class="card-title"><i class="ti '+f.icon+'" style="font-size:16px"></i>'+f.title+'</div><div class="flight-row"><div><div class="fl-time">'+f.from+'</div><div class="fl-code">'+f.fromCode+'</div></div><div class="fl-mid"><div class="fl-num">'+f.info+'</div><div class="fl-line"></div></div><div style="text-align:right"><div class="fl-time">'+f.to+'</div><div class="fl-code">'+f.toCode+'</div></div></div><div class="fl-tags">'+f.tags.map(t=>'<span class="badge bp">'+t+'</span>').join('')+'<span class="badge ba">'+dayDate(f.day)+'</span></div></div>';
  });
  D.flightNotes.forEach((n,i)=>{
    html += '<div class="card" style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:13px">'+n+'</span><button onclick="D.flightNotes.splice('+i+',1);save();renderFlights()" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px"><i class="ti ti-trash"></i></button></div>';
  });
  document.getElementById('flights-list').innerHTML = html;
}
function addFlightNote() {
  const v = document.getElementById('flight-note-input').value.trim();
  if(!v) return;
  D.flightNotes.push(v);
  document.getElementById('flight-note-input').value='';
  save(); renderFlights();
}

/* ITINERARY */
function renderItinerary() {
  const tabs = document.getElementById('itin-tabs');
  tabs.innerHTML = D.itinerary.map((d,i)=>'<button class="day-tab '+(i===D.itinDay?'active':'')+'" onclick="D.itinDay='+i+';save();renderItinerary()">D'+d.day+' '+CITY_LABELS[d.city].slice(0,2)+'</button>').join('');
  const day = D.itinerary[D.itinDay];
  let html = '<div class="card"><div class="card-title"><i class="ti ti-map-pin" style="font-size:16px"></i>'+day.title+'<span class="badge bp" style="margin-left:auto;font-size:11px">'+CITY_LABELS[day.city]+'</span></div>';
  html += '<div style="font-size:11px;color:var(--text3);margin-bottom:10px">'+dayDate(day.day)+'</div>';
  html += day.acts.map((a,ai)=>'<div class="act-row '+(a.done?'done':'')+'" onclick="toggleAct('+D.itinDay+','+ai+');renderItinerary()"><span class="act-time">'+a.time+'</span><span class="act-dot"></span><span class="act-name">'+a.name+'</span><i class="ti ti-'+(a.done?'circle-check':'circle')+' act-check"></i></div>').join('');
  html += '</div>';
  document.getElementById('itin-content').innerHTML = html;
}
function toggleAct(di, ai){ D.itinerary[di].acts[ai].done=!D.itinerary[di].acts[ai].done; save(); }
function addActivity() {
  const v = document.getElementById('act-input').value.trim();
  const t = document.getElementById('act-time').value;
  if(!v) return;
  D.itinerary[D.itinDay].acts.push({time:t,name:v,done:false});
  document.getElementById('act-input').value='';
  save(); renderItinerary();
}

/* RESTAURANTS */
function renderRestaurants() {
  const cities = ['all','cph','osl','ber','sto'];
  const labels = {all:'全部',cph:'哥本哈根',osl:'奧斯陸',ber:'卑爾根',sto:'斯德哥爾摩'};
  document.getElementById('rest-filters').innerHTML = cities.map(c=>'<button class="filter-chip '+(D.restFilter===c?'active':'')+'" onclick="D.restFilter=\''+c+'\';save();renderRestaurants()">'+labels[c]+'</button>').join('');
  const list = D.restaurants.filter(r=>D.restFilter==='all'||r.city===D.restFilter);
  if(!list.length){
    document.getElementById('rest-grid').innerHTML='<div class="empty" style="grid-column:1/-1"><i class="ti ti-tools-kitchen-2"></i><p>還沒有餐廳</p></div>';
    return;
  }
  document.getElementById('rest-grid').innerHTML = list.map((r,i)=>{
    const gi = D.restaurants.indexOf(r);
    return '<div class="rest-card '+(r.saved?'saved':'')+'" onclick="D.restaurants['+gi+'].saved=!D.restaurants['+gi+'].saved;save();renderRestaurants()"><div class="rest-name"><span>'+r.name+'</span><i class="ti ti-heart rest-heart"></i></div><div class="rest-stars">'+'★'.repeat(r.stars)+'☆'.repeat(5-r.stars)+'</div><div class="rest-meta">'+CITY_LABELS[r.city]+'</div><div style="font-size:11px;color:var(--text3);margin-top:3px">'+r.type+(r.note?' · '+r.note:'')+'</div></div>';
  }).join('');
}
function addRestaurant() {
  const n = document.getElementById('rest-input').value.trim();
  const c = document.getElementById('rest-city').value;
  if(!n) return;
  D.restaurants.push({name:n,city:c,type:'自訂',stars:4,saved:false,note:''});
  document.getElementById('rest-input').value='';
  save(); renderRestaurants();
}

/* PHOTOS */
function renderPhotos() {
  const allDays = [{label:'全部',val:0},...D.itinerary.map(d=>({label:'D'+d.day,val:d.day}))];
  document.getElementById('photo-tabs').innerHTML = allDays.map(d=>'<button class="day-tab '+(D.photoDay===d.val?'active':'')+'" onclick="D.photoDay='+d.val+';save();renderPhotos()">'+d.label+'</button>').join('');
  const photos = D.photoDay===0 ? D.photos : D.photos.filter(p=>p.day===D.photoDay);
  if(!photos.length){
    document.getElementById('photo-grid').innerHTML='<div class="empty" style="grid-column:1/-1"><i class="ti ti-camera"></i><p>還沒有照片</p></div>';
    return;
  }
  document.getElementById('photo-grid').innerHTML = photos.map(p=>'<div class="photo-cell"><img src="'+p.src+'" alt="'+p.name+'"><span class="photo-day-chip">D'+p.day+'</span></div>').join('');
}
function uploadPhotos(input) {
  const files = Array.from(input.files);
  let loaded = 0;
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = e=>{
      D.photos.push({src:e.target.result,name:file.name,day:D.photoDay||1});
      loaded++;
      if(loaded===files.length){save();renderPhotos();}
    };
    reader.readAsDataURL(file);
  });
}

renderToday();
</script>
